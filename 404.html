<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 - 행운로또</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 0;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        .back-home {
            padding: 12px 30px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .back-home:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <h1 class="error-code">404</h1>
            <p class="error-message">죄송합니다. 요청하신 페이지를 찾을 수 없습니다.</p>
            <p>페이지가 삭제되었거나 주소가 잘못되었을 수 있습니다.</p>
            <a href="/" class="back-home">홈으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
